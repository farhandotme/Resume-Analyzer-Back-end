services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always

  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"
    volumes:
      - "valkey_data:/bitnami/valkey/data"
