services:
  # ─── Infrastructure ───────────────────────────────

  postgres:
    image: postgres:15
    container_name: resume_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: resume_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant
    container_name: resume_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── AI Backend (FastAPI) ─────────────────────────

  fastapi:
    build:
      context: ./ai_backend
      dockerfile: Dockerfile
    container_name: resume_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - qdrant
    command: uv run fastapi dev main.py --host 0.0.0.0 --port 8000

  # ─── Celery Worker ────────────────────────────────

  celery:
    build:
      context: ./ai_backend
      dockerfile: Dockerfile
    container_name: resume_celery
    restart: always
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - qdrant
    command: uv run celery -A config.celery_app worker --loglevel=info

  # ─── Node.js Backend ──────────────────────────────

  node:
    build:
      context: ./app_backend
      dockerfile: Dockerfile
    container_name: resume_node
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FASTAPI_URL=http://fastapi:8000
    depends_on:
      - postgres
      - fastapi
    command: sh -c "bunx prisma migrate deploy && bun index.ts"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
